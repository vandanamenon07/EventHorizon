<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHorizon | College Event Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="menu-left" aria-hidden="false">
            <!-- simple menu icon top-left -->
            <button class="menu-btn" aria-label="Open menu">
                <span class="menu-lines"></span>
            </button>
        </div>

        <div class="search-wrap" role="search" aria-label="Search events">
            <input class="search-input" type="search" placeholder="Search events, colleges..." />
            <button class="search-btn" aria-label="Search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <h1>EVENT HORIZON</h1>
        <p>Discover events across all colleges in one place.</p>

        <nav class="main-nav" aria-label="Main navigation">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Projects</a></li>
                <li><a class="cta" href="#">Get in touch</a></li>
            </ul>
        </nav>
    </header>

    <section class="filter-container">
        <div class="filters-left">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="upcoming">Upcoming</button>
            <button class="filter-btn" data-filter="live">Live</button>
            <button class="filter-btn" data-filter="past">Past</button>
            <button class="filter-btn" data-filter="timeline">Timelines</button>
        </div>

        <button class="filter-tool" aria-label="Open filters">
            <!-- separate filter/funnel icon to the right -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M3 5H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6 12H18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10 19H14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </section>

    <section class="events-header">
        <h2 class="events-heading">Upcoming Events</h2>
    </section>

    <!-- Swipeable college cards carousel (swipe left/right) -->
    <section class="collage-carousel" aria-label="Colleges carousel">
        <div class="carousel-wrap">
            <button class="carousel-nav left" aria-label="Previous">‹</button>
            <div class="carousel-view">
                <div class="carousel-track" id="carouselTrack">
                    <!-- cards will be injected here by script.js -->
                </div>
            </div>
            <button class="carousel-nav right" aria-label="Next">›</button>
            <button class="more-btn" aria-label="More colleges">More</button>
        </div>
    </section>


    <main class="event-grid" id="eventGrid">
    </main>

    <div id="regModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-body">
                <!-- Dynamic content (event details or registration form) will be injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
